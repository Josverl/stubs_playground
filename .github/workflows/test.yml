name: Tests

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    # Tier 0: Pure Python + JavaScript unit tests, no browser, no server. Fast.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run Python unit tests
        run: uv run pytest -m unit -v || test $? -eq 5

      - name: Run JavaScript unit tests
        run: node --test tests/*.unit.mjs

  security-audit:
    # Tier 0: Check npm dependencies for known vulnerabilities.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --omit=dev || true

  worker-build:
    # Build dist/pyright_worker.js once and share across browser matrix jobs.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Build worker
        run: npx webpack --mode production

      - name: Upload worker artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyright-worker-dist
          path: dist/pyright_worker.js
          if-no-files-found: error

  browser-tests:
    # Tier 1+2: Playwright suites against browser + suite matrix.
    runs-on: ubuntu-latest
    needs: [worker-build]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        suite: [editor, worker]
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download worker artifact
        uses: actions/download-artifact@v8
        with:
          name: pyright-worker-dist
          path: dist

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-
            ${{ runner.os }}-playwright-

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Install Playwright browsers
        run: uv run playwright install ${{ matrix.browser }} --with-deps

      - name: Run suite tests
        run: uv run pytest -m "${{ matrix.suite }}" -v --browser-name "${{ matrix.browser }}"
