<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Transport Tests</title>
</head>
<body>
<pre id="log"></pre>
<script type="module">
import { WorkerTransport } from '../lsp/worker-transport.js';
import { SimpleLSPClient } from '../lsp/simple-client.js';

function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
}

// Helper: connect transport + do LSP init + return {transport, initResponse}
async function connectAndInit(transport) {
    await transport.connect();

    const initResponse = await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('LSP init timeout')), 15000);
        transport.subscribe((msgStr) => {
            const msg = JSON.parse(msgStr);
            if (msg.id === 1 && msg.result) {
                clearTimeout(timeout);
                resolve(msg);
            }
        });
        transport.send(JSON.stringify({
            jsonrpc: '2.0', id: 1, method: 'initialize',
            params: {
                processId: null, rootUri: 'file:///workspace',
                capabilities: { textDocument: { publishDiagnostics: { relatedInformation: true } } },
                workspaceFolders: [{ uri: 'file:///workspace', name: 'workspace' }],
            },
        }));
    });

    // Send initialized notification
    transport.send(JSON.stringify({ jsonrpc: '2.0', method: 'initialized', params: {} }));
    return { transport, initResponse };
}

const tests = {
    async connect() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await t.connect();
        const result = { success: true, connected: t.isConnected() };
        t.close();
        return result;
    },

    async 'lsp-init'() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        const { initResponse } = await connectAndInit(t);
        const caps = initResponse.result?.capabilities ? Object.keys(initResponse.result.capabilities) : [];
        t.close();
        return { success: true, capabilities: caps };
    },

    async diagnostics() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await connectAndInit(t);

        const diagResult = await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Diagnostics timeout')), 30000);
            t.subscribe((msgStr) => {
                const msg = JSON.parse(msgStr);
                if (msg.method === 'textDocument/publishDiagnostics') {
                    const diags = msg.params?.diagnostics || [];
                    if (diags.length > 0) {
                        clearTimeout(timeout);
                        resolve({ diagnosticCount: diags.length, message: diags[0].message });
                    }
                }
            });

            t.send(JSON.stringify({
                jsonrpc: '2.0', method: 'textDocument/didOpen',
                params: {
                    textDocument: {
                        uri: 'file:///workspace/main.py', languageId: 'python',
                        version: 1, text: 'x: int = "hello"\nprint(x)\n',
                    },
                },
            }));
        });

        t.close();
        return { success: true, ...diagResult };
    },

    async close() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await t.connect();
        t.close();
        return { success: true, connectedAfterClose: t.isConnected() };
    },

    async 'string-messages'() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await t.connect();

        const received = [];
        t.subscribe((msg) => received.push(msg));

        // Send LSP initialize
        t.send(JSON.stringify({
            jsonrpc: '2.0', id: 1, method: 'initialize',
            params: {
                processId: null, rootUri: 'file:///workspace',
                capabilities: {},
                workspaceFolders: [{ uri: 'file:///workspace', name: 'workspace' }],
            },
        }));

        // Wait for at least one response
        await new Promise((resolve) => {
            const check = setInterval(() => {
                if (received.length > 0) { clearInterval(check); resolve(); }
            }, 100);
            setTimeout(() => { clearInterval(check); resolve(); }, 10000);
        });

        const allStrings = received.every(m => typeof m === 'string');
        t.close();
        return { success: true, allStrings, messageCount: received.length };
    },

    async 'simple-client'() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await t.connect();

        const client = new SimpleLSPClient({ rootUri: 'file:///workspace', timeout: 10000 });
        await client.connect(t);

        const hasCapabilities = client.serverCapabilities !== null;

        // Open a file with a type error and wait for diagnostics
        const diagPromise = new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Diag timeout')), 30000);
            client.onNotification((method, params) => {
                if (method === 'textDocument/publishDiagnostics') {
                    const diags = params?.diagnostics || [];
                    if (diags.length > 0) {
                        clearTimeout(timeout);
                        resolve(diags.length);
                    }
                }
            });
        });

        client.notify('textDocument/didOpen', {
            textDocument: {
                uri: 'file:///workspace/test.py', languageId: 'python',
                version: 1, text: 'x: int = "hello"\n',
            },
        });

        const diagnosticCount = await diagPromise;
        client.disconnect();
        t.close();
        return { success: true, hasCapabilities, diagnosticCount };
    },

    async 'generated-config'() {
        const t = new WorkerTransport('../../dist/pyright_worker.js');
        await t.connect();
        const content = await t.readGeneratedConfig();
        t.close();
        return {
            success: true,
            hasToolSection: content.includes('[tool.pyright]'),
            hasStubPath: content.includes('stubPath = "/typings"'),
        };
    },
};

window.runTest = async function(name) {
    log(`Running test: ${name}`);
    try {
        const result = await tests[name]();
        log(`PASS: ${name} → ${JSON.stringify(result)}`);
        return result;
    } catch (err) {
        log(`FAIL: ${name} → ${err.message}`);
        throw err;
    }
};
</script>
</body>
</html>
